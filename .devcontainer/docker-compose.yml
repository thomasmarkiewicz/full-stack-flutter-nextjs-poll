version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile

    volumes:
      - ..:/workspace:cached
      - node_modules:/workspace/node_modules

    command: sleep infinity
    user: node

    depends_on:
      - postgres

    environment:
      - NODE_ENV=development
      # Prisma will use this exact URL to connect to the sibling postgres service via host networking
      - DATABASE_URL=postgresql://postgres:postgres@localhost:5432/anketa_poll?schema=public

    # Host networking for easy ADB and Localhost routing
    network_mode: host

    # USB device access (for physical Android devices)
    devices:
      - /dev/bus/usb:/dev/bus/usb
    privileged: true

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    # Share the host network so "localhost:5432" works from the app container
    network_mode: host
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: anketa_poll

volumes:
  node_modules:
  postgres-data: